<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona — Agrégateur de newsletters personnalisé</title>
    <meta name="description"
        content="Persona, votre assistant newsletter personnalisé. Inscrivez-vous et recevez des newsletters adaptées à vos centres d'intérêt." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ── Reset & Base ─────────────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a2e;
            --agent-bubble: #1e1e2e;
            --agent-text: #e0e0e8;
            --user-gradient: linear-gradient(135deg, #6c63ff, #a855f7);
            --user-text: #ffffff;
            --border: rgba(255, 255, 255, 0.06);
            --muted: #888;
            --accent: #6c63ff;
            --accent-hover: #7c73ff;
            --input-bg: #16162a;
            --radius: 18px;
            --radius-sm: 12px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--agent-text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ────────────────────────────────────────── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 720px;
            margin: 0 auto;
        }

        /* ── Header ────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 16px 14px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-size: 22px;
            font-weight: 700;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -.3px;
        }

        header .subtitle {
            position: absolute;
            bottom: 4px;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: .4px;
        }

        /* ── Chat area ─────────────────────────────────────── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar {
            width: 5px;
        }

        #chat::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        /* ── Messages ──────────────────────────────────────── */
        .msg {
            max-width: 82%;
            padding: 14px 18px;
            font-size: 14.5px;
            line-height: 1.6;
            border-radius: var(--radius);
            animation: msgIn .35s cubic-bezier(.22, 1, .36, 1) both;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg.agent {
            align-self: flex-start;
            background: var(--agent-bubble);
            color: var(--agent-text);
            border-bottom-left-radius: 6px;
            box-shadow: var(--shadow);
        }

        .msg.user {
            align-self: flex-end;
            background: var(--user-gradient);
            color: var(--user-text);
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.25);
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Typing indicator ──────────────────────────────── */
        .typing {
            display: flex;
            gap: 5px;
            align-self: flex-start;
            padding: 14px 22px;
            background: var(--agent-bubble);
            border-radius: var(--radius);
            border-bottom-left-radius: 6px;
            box-shadow: var(--shadow);
            animation: msgIn .3s cubic-bezier(.22, 1, .36, 1) both;
        }

        .typing span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            animation: bounce 1.3s ease-in-out infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: .15s;
        }

        .typing span:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: .4;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* ── Suggestions ───────────────────────────────────── */
        #suggestions {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 0 16px 8px;
            animation: msgIn .4s .15s cubic-bezier(.22, 1, .36, 1) both;
        }

        #suggestions button {
            padding: 10px 22px;
            font-family: inherit;
            font-size: 13.5px;
            font-weight: 600;
            color: #fff;
            background: transparent;
            border: 1.5px solid rgba(108, 99, 255, .5);
            border-radius: 100px;
            cursor: pointer;
            transition: all .2s ease;
        }

        #suggestions button:hover {
            background: rgba(108, 99, 255, .15);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        #suggestions button:active {
            transform: scale(.97);
        }

        /* ── Input bar ─────────────────────────────────────── */
        #input-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px 20px;
            border-top: 1px solid var(--border);
        }

        #input-bar input {
            flex: 1;
            padding: 14px 18px;
            font-family: inherit;
            font-size: 14.5px;
            color: var(--agent-text);
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 100px;
            outline: none;
            transition: border-color .2s;
        }

        #input-bar input::placeholder {
            color: var(--muted);
        }

        #input-bar input:focus {
            border-color: rgba(108, 99, 255, .45);
        }

        #input-bar input:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        #input-bar button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: var(--user-gradient);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .15s, box-shadow .2s;
            box-shadow: 0 2px 12px rgba(108, 99, 255, .3);
            flex-shrink: 0;
        }

        #input-bar button:hover {
            transform: scale(1.06);
            box-shadow: 0 4px 20px rgba(108, 99, 255, .45);
        }

        #input-bar button:active {
            transform: scale(.95);
        }

        #input-bar button:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Arrow SVG inside button */
        #input-bar button svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── Responsive ────────────────────────────────────── */
        @media (max-width: 480px) {
            header h1 {
                font-size: 19px;
            }

            .msg {
                max-width: 88%;
                font-size: 14px;
                padding: 12px 15px;
            }

            #input-bar {
                padding: 10px 10px 16px;
            }

            #input-bar input {
                padding: 12px 16px;
                font-size: 14px;
            }

            #input-bar button {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <header>
            <h1>Persona</h1>
            <span class="subtitle">agrégateur de newsletters</span>
        </header>

        <div id="chat"></div>

        <div id="suggestions">
            <button onclick="sendSuggestion('S\'inscrire')">S'inscrire</button>
            <button onclick="sendSuggestion('Se connecter')">Se connecter</button>
        </div>

        <div id="input-bar">
            <input id="msg-input" type="text" placeholder="Écrivez votre message…" autocomplete="off" />
            <button id="send-btn" aria-label="Envoyer">
                <svg viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        (() => {
            // ── Config ──────────────────────────────────────────
            const API_URL = 'https://n8n-l1e4.onrender.com/webhook/17ad0d98-7168-44d1-9b1b-cc6eb64658c7/chat';
            const sessionId = Math.random().toString(36).substring(2) + Date.now().toString(36);

            // ── DOM refs ────────────────────────────────────────
            const chat = document.getElementById('chat');
            const input = document.getElementById('msg-input');
            const sendBtn = document.getElementById('send-btn');
            const suggestions = document.getElementById('suggestions');

            let isLoading = false;

            // ── Welcome message ─────────────────────────────────
            addMessage(
                'Bonjour ! Je suis Persona, votre assistant newsletter personnalisé.\nSouhaitez-vous vous inscrire ou vous connecter ?',
                'agent'
            );

            // ── Event listeners ─────────────────────────────────
            sendBtn.addEventListener('click', () => handleSend());
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            // ── Suggestion buttons ──────────────────────────────
            window.sendSuggestion = (text) => {
                input.value = text;
                handleSend();
            };

            // ── Send handler ────────────────────────────────────
            async function handleSend() {
                const text = input.value.trim();
                if (!text || isLoading) return;

                // Hide suggestions on first user message
                if (suggestions) {
                    suggestions.style.transition = 'opacity .25s, transform .25s';
                    suggestions.style.opacity = '0';
                    suggestions.style.transform = 'translateY(8px)';
                    setTimeout(() => suggestions.remove(), 260);
                }

                addMessage(text, 'user');
                input.value = '';
                setLoading(true);

                const typingEl = showTyping();

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chatInput: text, sessionId })
                    });

                    if (!res.ok) throw new Error('Network response was not ok');

                    typingEl.remove();

                    // 1. On récupère tout le texte brut de la réponse
                    const responseText = await res.text();
                    
                    // 2. On sépare les lignes (le format est du NDJSON)
                    const lines = responseText.trim().split('\n');
                    
                    let fullReply = "";
                    const agentDiv = document.createElement('div');
                    agentDiv.className = 'msg agent';
                    chat.appendChild(agentDiv);

                    // 3. On boucle sur chaque ligne
                    lines.forEach(line => {
                        if (!line.trim()) return;
                        try {
                            const chunk = JSON.parse(line);
                            // On extrait le contenu uniquement si c'est un 'item'
                            if (chunk.type === 'item' && chunk.content) {
                                fullReply += chunk.content;
                            }
                        } catch (e) {
                            console.error("Erreur parsing JSON:", e);
                        }
                    });

                    // 4. On affiche le résultat final
                    agentDiv.textContent = fullReply || "Aucun contenu reçu.";
                    scrollToBottom();

                } catch (err) {
                    if(typingEl) typingEl.remove();
                    addMessage('Une erreur est survenue lors de la connexion avec le serveur.', 'agent');
                } finally {
                    setLoading(false);
                    input.focus();
                }
            }

            // ── Helpers ─────────────────────────────────────────
            function addMessage(text, role) {
                const div = document.createElement('div');
                div.className = `msg ${role}`;
                div.textContent = text;
                chat.appendChild(div);
                scrollToBottom();
            }

            function showTyping() {
                const el = document.createElement('div');
                el.className = 'typing';
                el.innerHTML = '<span></span><span></span><span></span>';
                chat.appendChild(el);
                scrollToBottom();
                return el;
            }

            function scrollToBottom() {
                requestAnimationFrame(() => {
                    chat.scrollTop = chat.scrollHeight;
                });
            }

            function setLoading(state) {
                isLoading = state;
                input.disabled = state;
                sendBtn.disabled = state;
            }
        })();
    </script>

</body>

</html>
